<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      
      <nav id="site-nav" class="greedy-nav" style="display:flex; align-items:center; justify-content:space-between;">

        <!-- ✅ 로고 (왼쪽 고정) -->
        <a href="{{ base_path }}/" style="display:flex; align-items:center;">
          <img src="/images/logo.png" style="height:60px;">
        </a>

        <!-- ✅ 메뉴 (오른쪽) -->
        <ul class="visible-links" style="display:flex; align-items:center;">
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}

          <!-- 다크모드 -->
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button"><i class="fa-solid fa-sun"></i></a>
          </li>
        </ul>

      </nav>

    </div>
  </div>
</div>
